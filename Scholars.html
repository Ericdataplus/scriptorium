<style>
:root{--bg:#131311;--ink:#e7e5e0;--dim:#8f8b84;--line:#2b2a26;--green:#16213e;--green-line:#101830;--green-nav:#c3d0e8;
 --accent:#d99e2b;--panel:#2a2825;--panel-hi:#343029;--card:#1a1917;

*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:40;background:var(--green);border-bottom:1px solid var(--green-line)}

.controls{position:sticky;top:57px;z-index:35;background:var(--bg);padding:12px 0 10px;border-bottom:1px solid var(--line)}

.stab button.on{background:var(--accent);color:#171003}
.filt{display:inline-flex;background:var(--panel);border-radius:9px;padding:4px;gap:2px;flex-wrap:wrap}
.filt button{background:transparent;border:0;color:var(--dim);font:inherit;font-size:12px;font-weight:700;padding:6px 10px;border-radius:7px;cursor:pointer}

.wrap{max-width:1240px;margin:0 auto;padding:14px 26px 140px}
.hero{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin:10px 0 18px}

.item{border:1px solid var(--line);background:var(--card);border-radius:12px;margin:11px 0;padding:13px 16px}
.item .top{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.item .cl{font-weight:700;font-size:14.5px;line-height:1.45;flex:1;min-width:240px}
.vbadge{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:999px;color:#0b120e;white-space:nowrap;margin-top:2px}
.item .test{margin-top:8px;font-size:12.5px;color:#9fb3a6}
.item .test b{color:#e0bd6f;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.item .det{margin-top:7px;font-size:13.5px;line-height:1.58;color:#d0ccc4}
.item .cit{margin-top:8px;font-size:11.5px;color:var(--dim);font-style:italic;border-top:1px dashed var(--line);padding-top:7px}

.navtog{display:none}
@media(max-width:1280px){

 .hbar nav a{padding:12px 6px !important;font-size:15px;border-bottom:1px solid rgba(255,255,255,.08)}
 .hbar nav a:last-child{border-bottom:0}
 .hbar nav a.on{color:#fff}
 .hbar nav a.on::after{display:none}
 .navtog:checked ~ nav{display:flex}
 .navbtn{display:flex;align-items:center}
}

<script>
window.SCH=[{"slug": "macdonald", "name": "Dennis R. MacDonald", "field": "Mimesis criticism — NT imitates Homer & Euripides", "thesis": "MacDonald (Harvard PhD; Claremont) argues the Gospel authors were Greek-educated elites who consciously practiced mimesis — the rhetorical craft of creative imitation taught via the progymnasmata — recasting Homer's Iliad/Odyssey and Euripides' Bacchae into Christian narrative, with Jesus staged as a superior rival to Odysseus, Achilles, Heracles, and Dionysus. He tests candidates against six criteria (accessibility, analogy, density, order, distinctive traits, interpretability) and frames the project as a Kuhnian paradigm shift against form-criticism's folklore model.", "our_verdict": "An exhaustive lexical survey of the full LXX+NT against all of Homer found dependence NOT demonstrable at the corpus level (20 strongest candidates verified: 0 GENUINE, 4 PLAUSIBLE, 16 SPURIOUS) — high raw overlap is shared Koine/universal ANE-Greek tropes, not borrowing. A follow-up 19-candidate adversarial workflow targeting MacDonald's own best terrain (Mark, John/Bacchae, Acts) reached the same calibrated conclusion: most candidates lose decisively to a Septuagintal source once checked against the actual Greek (Job 9:8 beats the sea-walking scene word for word; Ps 105:9 beats the storm-rebuke; Gen 39:12 beats the naked-flight verbs); several of MacDonald's own headline cases (Bacchae/John 6 flesh-blood, Cana wine, Acts 12 prison-escape) are real, well-verified parallels but are not new — they are already his own published arguments or decades-old in mainstream scholarship. A handful of genuinely fresh, philologically careful finds survive at SILVER tier (John 19:9 Pilate/Pentheus was even graded likely-GOLD by the discovery pass but is better classed SILVER pending independent review), plus one clean-negative correction (Mark's Gerasene chain-breaking beats Daniel 4 as an LXX-comparandum, favoring Euripides' Heracles Mainomenos on that narrow point). Net: MacDonald's paradigm survives only in modest, well-defined pockets, chiefly Johannine, not as a comprehensive scene-by-scene program across Mark.", "items": [{"claim": "MacDonald's six mimesis criteria (accessibility, analogy, density, order, distinctive traits, interpretability) as a scoring rubric for any proposed Homer/Euripides→NT parallel.", "test": "Adopted as the adversarial-verification rubric for a 19-candidate workflow testing NT scenes against Homer/Euripides/Sophocles/Hesiod, with an LXX-veto step added (does a Septuagintal source explain the diction better?) not in MacDonald's own method.", "verdict": "PARTIAL", "detail": "The criteria are usable and discriminating once genuinely applied — most REJECTs failed on 'distinctive traits' or 'order' exactly as the rubric predicts, and 'interpretability' alone (without density/order) was shown to be too permissive on its own.", "citation": "THINKING_LIKE_MACDONALD.md Part II; macdonald_journal.txt workflow"}, {"claim": "Mark's whole Passion/burial sequence is comprehensively modeled on the Iliad — walking on water = Hermes' errand from Zeus; the storm-calming = Achilles vs. the river Scamander; the Gerasene swine = Odysseus's doomed crew eating Helios's cattle.", "test": "Each candidate individually checked against Homer's actual Greek and against the LXX, in the 'Mark's Galilean-sea material' cluster.", "verdict": "REFUTED", "detail": "All three lose decisively and specifically to Septuagintal sources verified word-for-word: Job 9:8 LXX περιπατῶν...ἐπὶ...θαλάσσης for the sea-walk, Ps 105(106):9 LXX ἐπετίμησεν τῇ θαλάσσῃ + Jonah's ἀπολώμεθα for the storm-rebuke, Exodus 15/Ps 105:9-11 (Pharaoh's drowned army) for the swine. Zero shared vocabulary with the proposed Homeric passages in any of the three.", "citation": "macdonald_journal.txt RESULT 5 cluster verdict"}, {"claim": "Jesus walking on water (Mark 6:48-50) imitates Hermes with golden sandals walking on water, sent by Zeus from a mountain, terrifying companions.", "test": "Direct Greek comparison against Job 9:8 LXX and Odyssey 5's Ino/Leucothea alternative, both re-tested independently.", "verdict": "REFUTED", "detail": "περιπατῶν ἐπὶ τῆς θαλάσσης is verbatim Job 9:8 LXX, an exclusive divine attribute; Homer supplies zero lexical overlap (φάντασμα/περιπατῶν/θαρσεῖτε absent from Od.5.333-353) and even the alternative Ino/Leucothea pairing was independently tested and rejected as LXX-inferior.", "citation": "macdonald_journal.txt RESULT 5 & RESULT 17 (tier: REJECT)"}, {"claim": "Joseph of Arimathea's rescue and burial of Jesus's body directly parallels Priam's begging Achilles for Hector's corpse (Iliad 24) — MacDonald's own published case.", "test": "Verified structural/thematic parallel plus a novel philological refinement: τολμήσας (Mark 15:43) and ἔτλην (Iliad 24.505) share the same PIE root (τλα-/τολμα-) for 'daring/enduring' at the identical narrative slot (just before the successful plea for the corpse).", "verdict": "SUPPORTED", "detail": "This is MacDonald's best-attested case in the whole corpus — order and interpretability hold up, and the project's own contribution is a specific root-level lexical detail sharpening (not exceeding) his existing argument; no LXX competitor (Gen 50:4-6) carries the daring/danger emphasis.", "citation": "macdonald_journal.txt RESULT 11, candidate 5 (tier: SILVER, 'likely-SILVER')"}, {"claim": "Acts 12's prison escape (Peter's chains fall off, gate opens αὐτομάτη) imitates the Bacchae's self-releasing fetters/doors (Bacc. 447-448 αὐτόματα...δεσμά) and Herod's death-by-worms echoes Pentheus's sparagmos.", "test": "Verbal echo (αὐτόματος) verified genuine and rare on both sides; checked against decades of prior scholarship (Haenchen 1971, Pervo, Brenk, Seaford, Weaver's 2004 monograph) and against MacDonald's own 2003 book, which already treats this exact pericope via Priam/Iliad 24.", "verdict": "OVERSTATED", "detail": "The αὐτόματος echo is real, but it is a shared cross-genre topos-word (also Iliad 5.749, LXX Joshua 6:5), not Euripides-specific; the 'ruler destroyed' beat actually matches 2 Maccabees 9:9 LXX (Antiochus's worm-death, same σκωληκ- root) and Josephus's independent historical account far better than Pentheus's dismemberment, which shares no vocabulary at all. This exact Acts-12/Bacchae parallel is textbook material since Haenchen — not new.", "citation": "macdonald_journal.txt RESULT 8 (tier: SILVER, self-graded down from submitted 'likely-GOLD')"}, {"claim": "John's Bread of Life discourse (eating Jesus's σάρξ, drinking his αἷμα, John 6:53-56) imitates the Bacchae's ὠμοφαγία (raw-flesh-eating) cult theology, climaxing in Pentheus's sparagmos.", "test": "σάρξ/αἷμα paired-lemma proximity confirmed genuine on both sides (Bacc. 139-143, 735-747, 1125-1136 vs John 6:53-56); checked against Lev 17's blood-taboo (no positive OT model exists) and against MacDonald's own 2017 book The Dionysian Gospel, whose footnoted proof-texts are nearly the same line numbers.", "verdict": "SUPPORTED", "detail": "The LXX veto genuinely fails here (no positive Torah template for eating a deity's flesh/blood), so Euripides legitimately beats the Septuagint — but this is not new: it is the flagship, line-for-line-matching argument of MacDonald's own 2017 monograph, also the subject of a dedicated Jae Hyung Cho monograph.", "citation": "macdonald_journal.txt RESULT 9 (tier: SILVER, 'likely-GOLD' self-grade downgraded)"}, {"claim": "John 19:9-11 (Pilate's πόθεν-interrogation of the silent Jesus, and his ἐξουσία/authority claim) imitates Pentheus's interrogation of the disguised Dionysus (Bacchae ~464-517), who likewise claims κυριώτερος authority over a captive who deflects it to a higher power.", "test": "Full 5-beat sequence check (origin-question → non-disclosure → ruler's authority-claim → captive's rebuttal relocating true authority → ruler's unknowing guilt) against both the Bacchae Greek and Isaiah 53:7 LXX (which covers only the silence, not the authority-debate).", "verdict": "SUPPORTED", "detail": "Isaiah 53:7 LXX fully explains Jesus's silence alone but supplies no interrogation-dialogue or ἐξουσία/κυριώτερος debate; that whole exchange (19:10-11) has no OT citation anywhere nearby (contrast 19:24's explicit Ps 22 citation two verses later), leaving Euripides as the only extant close model for the dialogic unit as a whole.", "citation": "macdonald_journal.txt RESULT 4, candidate 1 (self-graded 'likely-GOLD'; assessed here as the workflow's strongest, though still unreviewed, find)"}, {"claim": "Cana's water-to-wine miracle (John 2:1-11), programmatically 'the beginning of his signs,' imitates Dionysus's earth-struck wine miracle in the Bacchae (~705-708), staged as a rival god's first public epiphany.", "test": "Checked the macro-parallel plus an added πόθεν-ignorance thread (John 2:9 'they did not know πόθεν it was') tying Cana into the Gospel-wide πόθεν-refrain (1:48, 3:8, 4:11, 7:27-28, 8:14, 9:29-30, 19:9).", "verdict": "OVERSTATED", "detail": "The LXX veto is weak (no OT water-to-wine template) so the macro-parallel is legitimate, but it is explicitly MacDonald's own opening case in The Dionysian Gospel (pp.40-44), and the πόθεν-thread duplicates 40-year-old Johannine 'misunderstanding' scholarship (Leroy 1968; Carson 1982) plus MacDonald's own paired reading of 8:12-19 and 18:28-19:16.", "citation": "macdonald_journal.txt RESULT 4 candidate 3 and RESULT 18 (tier: SILVER)"}, {"claim": "John 15:1 ('I am the true vine') implies a 'false vine' = Dionysus, since Dionysus is repeatedly glossed via ἄμπελος in the Bacchae.", "test": "Checked ἄμπελος-sharing against Jeremiah 2:21 LXX, which supplies the exact ἄμπελος + ἀληθινή collocation in a first-person divine planting-speech with a ready-made 'foreign vine' antithesis (ἡ ἄμπελος ἡ ἀλλοτρία).", "verdict": "REFUTED", "detail": "Jeremiah 2:21 LXX wins decisively and verbally; Dionysus is never called ἄμπελος in first person nor paired with ἀληθινή anywhere in the play. Also not new — this is a centerpiece argument of MacDonald's own 2017 book.", "citation": "macdonald_journal.txt RESULT 4 candidate 4 & RESULT 13 (tier: REJECT)"}, {"claim": "Acts 2:13-15's Pentecost crowd mistaking Spirit-filled speech for wine-drunkenness, and Peter's public rebuttal, echoes the Bacchae messenger's rebuttal of the same charge against Dionysus's ecstatic devotees.", "test": "Structural 'not as you say' rebuttal-formula compared against 1 Samuel (1 Kgdms) 1:13-15 LXX (Eli accusing Hannah of drunkenness).", "verdict": "OVERSTATED", "detail": "Genuinely split: the LXX (Hannah/Eli) is verbally closer (shares μεθύω/οἶνος) but is a private one-on-one scene, whereas both Acts and Bacchae stage a third party publicly defending a whole group — a real structural edge for Euripides that the project graded only 'weak' overall given the strong OT rival.", "citation": "macdonald_journal.txt RESULT 4 candidate 5"}, {"claim": "Rhoda's joyful, disbelieved report of Peter's return (Acts 12:13-16) imitates Eurycleia's report of Odysseus's return to the disbelieving Penelope (Odyssey 23), including a shared 'you are mad' charge (μαίνῃ/μάργην).", "test": "Checked the lexical charge against Luke's own reuse of Μαίνῃ elsewhere (Acts 26:24, Festus to Paul) and against three independent published treatments of this exact comparison (Kochenash 2022; a 2023 'Revisiting Rhoda' article; Philip Long).", "verdict": "OVERSTATED", "detail": "μαίνῃ and μάργην are different roots, and Luke's own reuse of Μαίνῃ elsewhere proves it is his stock idiom, not a Homeric marker; the same-author Luke 24:11 ('these words seemed like nonsense') is a cheaper in-corpus explanation, and the specific Eurycleia comparison is already three-times published by other scholars.", "citation": "macdonald_journal.txt RESULT 10 (tier: BRONZE)"}, {"claim": "Paul's Areopagus opening ('I perceive you are very religious... an altar to an unknown god,' Acts 17:22-23) imitates Odysseus's supplication to Nausicaa/Arete ('are you a god or mortal?', Od. 6.149, 7.146) — a recurring Homeric captatio-benevolentiae type-scene.", "test": "Checked whether the Arete passage (Od. 7.146) actually contains the same god/mortal ambiguity, and searched for prior scholarly treatment of this specific pairing.", "verdict": "REFUTED", "detail": "The Arete passage does not in fact carry the ambiguity language (only a divine epithet for her father), deflating 'recurs twice in Homer' to one real data point; more economical non-Homeric explanations exist (captatio benevolentiae is a codified universal rhetorical topos, and the 'unknown god' altar is independently attested real Athenian cultic history, Pausanias 1.1.4). Genuinely novel as a pairing, but fails the veto against non-literary explanations.", "citation": "macdonald_journal.txt RESULT 14 (tier: REJECT)"}, {"claim": "The mock-coronation of Jesus by Roman soldiers (Mark 15:16-20 — purple robe, thorn crown, reed-striking, mock-kneeling) imitates the beating of Thersites with Agamemnon's royal scepter before the whole army (Iliad 2.211-270).", "test": "Full 5-beat order comparison (posture toward royal speech → reviled → struck with the royal emblem before a crowd → blood/cowering → crowd response) plus a check for verbal echo and for a real-world Hellenistic mock-king ritual competitor (Philo's Carabas; the Persian Sacaea).", "verdict": "PARTIAL", "detail": "A rare structural device — a royal emblem turned weapon on a mocked body before onlookers — genuinely recurs in the same narrative slot in both texts, and Isaiah 50:6 LXX covers only the spitting/striking, not the crown/robe/reed/kneeling apparatus, leaving real open ground. But there is no shared vocabulary (κάλαμος ≠ σκῆπτρον), and an attested contemporary Hellenistic mock-coronation custom is a live non-literary competitor.", "citation": "macdonald_journal.txt RESULT 11, candidate 1 (self-graded 'likely-SILVER')"}, {"claim": "The naked young man fleeing at Jesus's arrest (Mark 14:51-52) imitates Odysseus's threat to strip Thersites naked before the army (Iliad 2.261-264); alternately, per MacDonald's own published Elpenor thesis (advised student Sungchan Moon), it imitates Elpenor's ignoble fall in the Odyssey.", "test": "Verb-level check: Mark's καταλιπὼν...ἔφυγεν against Homer's δύω ('strip', an unenacted threat by the aggressor, wrong actor/mode) and against Genesis 39:12 LXX (Joseph fleeing Potiphar's wife).", "verdict": "REFUTED", "detail": "Genesis 39:12 LXX is a near word-for-word match (identical aorist participle καταλιπὼν + aorist φεύγω) while Homer shares zero vocabulary and the wrong narrative shape (threat vs. completed self-rescue); also not open ground, since MacDonald's own advisee already published an Elpenor-based Homeric thesis for this exact verse-pair.", "citation": "macdonald_journal.txt RESULT 19 & RESULT 1 (naked youth listed under MacDonald's own Elpenor pairing, tier: REJECT for the new Thersites variant)"}, {"claim": "Jesus's Gethsemane prayer to 'Abba, Father' (Mark 14:32-36), asking that the cup pass, imitates Achilles' withdrawal and prayer to his divine mother Thetis (Iliad 1.348-357).", "test": "Checked Mark's own diction ('Περίλυπός ἐστιν ἡ ψυχή μου') against LXX Psalm 41/42-43's περίλυπος/ψυχή refrain, and noted MacDonald's own published model for this scene is Odysseus/Circe (Od. 10), not this pairing.", "verdict": "REFUTED", "detail": "The LXX Psalms refrain wins the actual quoted clause outright; Homer's vocabulary (δακρύσας/ἠρήσατο) supplies nothing comparable; and MacDonald's own antecedent-slot for this pericope is already occupied by a different Homeric scene (Circe), so this could only ever be a thin supplementary layer.", "citation": "macdonald_journal.txt RESULT 11, candidate 3 (self-graded 'weak')"}, {"claim": "The Gerasene demoniac's superhuman chain-breaking and restoration to 'sound mind' (Mark 5:3-5,15) imitates Heracles's madness, forcible restraint, and restoration in Euripides' Heracles Mainomenos.", "test": "Compared against Daniel 4's Nebuchadnezzar (the standard LXX comparandum for divinely-sent madness with restoration) for which text supplies the specific chain/self-mutilation/repeated-failed-restraint details.", "verdict": "SUPPORTED", "detail": "Daniel 4 has the general madness-then-restoration arc but no chain-breaking, self-mutilation, or repeated-failed-restraint motif; Euripides supplies exactly these distinctive details, though the ORDER of the binding-vs-restoration beats does not line up cleanly (Mark's chains precede the cure; Euripides' bonds follow the rampage), keeping this out of GOLD territory. Note: Mark's own diction elsewhere in the pericope ('Τί ἐμοὶ καὶ σοί,' 5:7) is verbatim Septuagintal (3 Kgdms 17:18), showing surface diction is LXX even where the underlying chain-motif may be Greek.", "citation": "macdonald_journal.txt RESULT 5, candidate 4 (self-graded 'likely-SILVER')"}, {"claim": "Nain's widow's son (Luke 7:11-17) and Jairus's daughter (Luke 8:49-56) imitate Heracles wrestling Death and restoring Alcestis at her tomb (Euripides, Alcestis, final scene), confirmed by touch as proof of life.", "test": "Compared the tomb-side/bier-side staging and hand-contact confirmation-of-life beat against the standing LXX comparanda (1 Kings 17 Elijah/widow's son; 2 Kings 4 Elisha/Shunammite's son).", "verdict": "PARTIAL", "detail": "Luke 7:15's closing clause ('he gave him to his mother') is textually locked to 1 Kgdms 17:23 LXX verbatim — Elijah is the formula's source — but neither Elijah nor Elisha revives a body already in transit to burial or uses a single confirmatory touch; that staging is closer to Alcestis. A genuinely layered case: formula from the LXX, staging plausibly from Euripides.", "citation": "macdonald_journal.txt RESULT 12, candidates 1-2 (self-graded 'likely-SILVER' / 'weak')"}, {"claim": "The boy Jesus astounding the Temple teachers at twelve (Luke 2:41-52) imitates the young Cyrus astounding King Astyages with bold, self-possessed speech (Herodotus 1.114-116).", "test": "Compared the child-prodigy-astounds-authorities type-scene against 1 Samuel 2:26 LXX (the boy Samuel) and against Susanna/Daniel 13 (a young figure exposing elders).", "verdict": "REFUTED", "detail": "The framing verses (Luke 2:40, 2:52) are near-verbatim echoes of 1 Kgdms 2:26 LXX on the young Samuel, and the closest scene-type analogue is Jewish-Greek Susanna, not Homer or Euripides (which have no comparable set-piece at all); Herodotus, the best available Greek-prose analogue, sits outside MacDonald's own stated remit (Homer/Euripides) and shares the field evenly with these Jewish-Greek competitors.", "citation": "macdonald_journal.txt RESULT 12, candidate 3 (self-graded 'likely-SILVER' but assessed here as an LXX-explained scene)"}, {"claim": "The Annunciation's 'the power of the Most High will overshadow you' (Luke 1:35) imitates Poseidon (disguised as the river-god Enipeus) concealing himself with a wave to beget Tyro's children (Odyssey 11.235-253), a stock 'god begets mortal woman's child' Greek myth pattern.", "test": "Checked ἐπισκιάζω against Exodus 40:34-35 LXX (the cloud overshadowing the tabernacle) and the greeting-formula against Zephaniah 3:14,17 LXX ('Rejoice, daughter of Zion... the Lord is with you').", "verdict": "REFUTED", "detail": "ἐπισκιάζω is the identical rare verb Luke reuses only at the Transfiguration (9:34, same cloud-imagery) — a self-referential Exodus intertext, not Homeric; the greeting-formula's 'rejoice + the Lord is with you' unit is fully present in Zephaniah and absent from Poseidon's speech; and χαῖρε is the single most generic Greek greeting, failing distinctiveness outright.", "citation": "macdonald_journal.txt RESULT 12, candidate 4 (self-graded 'weak')"}, {"claim": "The Temptation of Jesus (Luke 4:1-13), offering exalted status in exchange for abandoning his mission, imitates Calypso's offer of immortality to Odysseus if he abandons his homeward voyage (Odyssey 5.135-136).", "test": "Compared Luke's tightly-ordered three-part escalating test (bread/kingdoms/testing-God) against Calypso's single one-beat offer, and confirmed Luke's explicit self-declared Deuteronomy citations.", "verdict": "REFUTED", "detail": "All three of Jesus's replies are explicitly marked quotations (γέγραπται/εἴρηται) of Deuteronomy 8:3, 6:13, 6:16 LXX; Calypso's single-beat offer has no three-part structure to match and shares no vocabulary — a clean negative with the text naming its own source three times over.", "citation": "macdonald_journal.txt RESULT 12, candidate 5 (self-graded 'weak')"}, {"claim": "Ananias and Sapphira's sudden collapse-deaths (Acts 5:5, 5:10, ἐξέψυξεν) echo a Homeric battlefield death-notice formula.", "test": "Full-corpus search of Iliad/Odyssey for ἐκψύχω/ἀποψύχω and Homer's standard collapse formulas (θάνατος/μοῖρα ἐκάλυψε, γούνατα/γυῖα λύθη, δούπησε πεσών).", "verdict": "REFUTED", "detail": "Confirmed clean negative: ἐκψύχω is Hellenistic/medical (Hippocratic) vocabulary absent from Homer entirely; the adversarial pass additionally found a closer, previously-missed LXX match the original candidate overlooked — Judges 4:21 LXX's Sisera death scene, with the identical compound and form ('ἐξέψυξεν') at someone's knees after a confrontation.", "citation": "macdonald_journal.txt RESULT 7 (tier: REJECT)"}, {"claim": "Paul's snakebite-survival and vindication on Malta (Acts 28:3-6, the crowd's verdict shifting from 'murderer' to 'a god') imitates a Homeric/Euripidean scene of personified Justice (Dike) catching a wrongdoer.", "test": "Searched Iliad/Odyssey/Bacchae for any scene combining shipwreck-survival, snakebite, and a crowd-verdict reversal; checked Hellenistic-epigram and Nicander's Theriaca as an alternative source register.", "verdict": "REFUTED", "detail": "No Homeric/Euripidean scene matches with any density — personified Dike punishing an escaped wrongdoer is a Greek cultural commonplace, not distinctive to one passage. The 'mistaken for a god' payoff is already MacDonald's own published Odyssey 5/6/12 argument for all of Acts 27-28; the viper/Dike middle is already covered in NT scholarship via Nicander's Theriaca and Greek-epigram tradition — no unclaimed ground for a Homer/Euripides reading either way.", "citation": "macdonald_journal.txt RESULT 6 (tier: REJECT)"}]}, {"slug": "mason", "name": "Steve Mason", "field": "Josephus studies — Luke-Acts used Josephus", "thesis": "Mason argues that Luke-Acts shows specific literary dependence on Josephus's Antiquities and Jewish War — not merely shared historical background but borrowed material, including apparent errors that only make sense if Luke read and misremembered or garbled Josephus's narrative (e.g., the Theudas/Judas sequence in Acts 5:36-37 mirrors Josephus's own adjacent, but chronologically different, treatment of the two figures).", "our_verdict": "The project built a calibrated, reusable dependency-testing template (control-historian calibration + LXX exclusion + size-controlled sampling + n-gram phrase test + directional-seam analysis) and used it to test Mason's claim across all four Gospels plus Acts. Result: Luke-Acts dependence on Josephus is DEMONSTRATED — not from bulk vocabulary overlap (which is mostly confound: shared 1st-century-Judea subject matter plus shared koine register) but from a genuine lexical monopoly (σικάριοι) and multiple directional narrative seams whose errors run one way, from Luke misreading Josephus. This requires Luke-Acts to postdate Antiquities (93/94 CE), i.e. Luke-Acts ≥ ~95-100 CE. Mark shows one strong seam; Matthew and John show no dependence beyond shared topic and register — a clean, quantified confirmation-with-correction of Mason's original claim. [Re-verified 07/10/2026: the underlying test scripts were re-run against the post-consolidation corpus — every published number reproduced exactly; verdict unchanged.]", "items": [{"claim": "Josephus is the closest lexical relative of the Gospels among all Greek historians of the era, evidence of a special relationship.", "test": "Compared each Gospel's distinctive non-LXX rare vocabulary shared with a 120,000-token sample of Josephus against 8 control historians (Plutarch, Polybius, Herodotus, Thucydides, Strabo, Xenophon, Dionysius of Halicarnassus, Appian) at equal sample size.", "verdict": "CONFIRMED", "detail": "Josephus is a 10-33x lexical outlier over every control historian for every Gospel and Acts (e.g., Acts shares 289 distinctive words with Josephus vs. ~9 for the best control); 'Josephus-exclusive' word counts run into the hundreds (Acts 548) versus single digits for any individual control.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §1"}, {"claim": "This lexical closeness proves direct literary dependence on Josephus's text.", "test": "Classified the Josephus-exclusive words by category (proper nouns, Judaica, koine-register vocabulary) to isolate what fraction is genuinely distinctive versus confounded.", "verdict": "OVERSTATED", "detail": "Most of the bulk overlap is confound: Josephus is the only comparable Greek author writing about 1st-century Judea (so proper nouns like Καφαρναούμ, Φαρισαῖοι are shared only with him) and he writes koine while the controls Atticize. The genuinely distinctive residue is small — Matthew ~8%, Mark ~13%, John almost entirely confound.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §2"}, {"claim": "The Gospels copied Josephus's actual wording, not just his content.", "test": "N-gram (bigram/trigram) test for exclusive shared phrases between each Gospel and Josephus, excluding anything also in the LXX or the 8 control historians.", "verdict": "REFUTED", "detail": "Zero distinctive shared trigrams for Mark and Luke, one (generic) each for John and Acts ('a long time already', 'a certain place called'); no verbatim phrase-level copying anywhere — dependence, where real, operates at the level of content and distinctive terms, not text reproduction.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §3"}, {"claim": "Acts 5:36-37 (Gamaliel's speech) lists Theudas before Judas the Galilean, mirroring Josephus's own narrative order in Antiquities 20.97-102, even though Theudas (44-46 CE) postdates Judas (6 CE) and postdates Gamaliel's own speech (~33 CE) — a genuine anachronism.", "test": "Verified the Greek of both Acts 5:36-37 and Antiquities 20.97-102 and confirmed the chronological impossibility (Theudas's revolt occurred a decade after the narrative date of Gamaliel's speech).", "verdict": "CONFIRMED", "detail": "This is graded a 'strong' seam: Josephus's own text is internally coherent (Theudas correctly placed after Judas at Ant. 20.97), while Luke's Gamaliel garbles the sequence in a way that only makes sense as an error picked up from reading Josephus's adjacent treatment of the two figures out of order.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §4 table"}, {"claim": "Acts 21:38's 'the Egyptian' who led '4,000 men of the sicarii (σικάριοι)' into the wilderness conflates distinct groups and terminology that appear separately in Josephus's Jewish War 2.254-263.", "test": "Checked σικάριοι for occurrence anywhere in the LXX or the 8 control historians before the 2nd century, and compared Acts's single-sentence conflation against Josephus's three separately-described groups (urban sicarii, desert prophets, the Egyptian).", "verdict": "CONFIRMED", "detail": "σικάριοι is a genuine lexical monopoly — found only in Josephus and Acts before the 2nd century, absent from the LXX and all 8 controls — and Acts collapses Josephus's three distinct groups into one sentence, a garbling error that argues for Luke reading (and compressing) Josephus's account.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §4 table"}, {"claim": "Luke's census of Quirinius (Luke 2:1-2) and its associated dating problem (Acts 5:37) derive from the same ἀπογραφή + Quirinius + Judas-the-Galilean nexus uniquely found in Josephus, Antiquities 18.1-10.", "test": "Checked whether this specific census/Judas-the-Galilean/Quirinius combination occurs in any source other than Josephus, and whether Luke inherits its well-known dating problem (census dated to 6 CE, after Herod's death in 4 BCE).", "verdict": "CONFIRMED", "detail": "The nexus is uniquely Josephan; Luke inherits its famous dating problem intact, consistent with drawing the material from Josephus's narrative rather than an independent source.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §4 table"}, {"claim": "Luke 3:1's dating reference to 'Lysanias of Abilene' derives from an obscure synchronism attested only in Josephus, Antiquities 19.275-277.", "test": "Searched for independent attestation of this specific Lysanias/Abilene synchronism outside Josephus.", "verdict": "SUPPORTED", "detail": "Graded 'strong-moderate': the synchronism is attested only in Josephus and Luke drops it into his own dating frame in a manner consistent with, though not as decisive as, the Theudas/Judas and σικάριοι seams.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §4 table"}, {"claim": "Acts 26:5's 'strictest sect' (ἀκριβεστάτη αἵρεσις) and the technical use of βαπτιστής as a title echo Josephus's own technical vocabulary for Jewish sects (Antiquities 18.12, 18.116).", "test": "Compared the technical sense and register of these terms in Acts against their Josephan usage.", "verdict": "SUPPORTED", "detail": "Graded 'strong-moderate': the technical vocabulary match (ἀκριβ- root, βαπτιστής as a title) is real and specific, reinforcing the case for Luke-Acts's direct Josephan dependence alongside the other seams.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §4 table"}, {"claim": "The Passion narrative's structural resemblance between Jesus and 'Jesus son of Ananias' (Josephus, Jewish War 6.300-309 — arrested by chief priests, beaten, handed to the Roman governor, silent under interrogation, crying woes on Jerusalem) is the strongest Mark-side evidence of dependence.", "test": "Structural comparison of the two 'Jesus' figures' arrest-beating-handover-silence-woes sequence across Mark 14-15/Luke 22-23 and Josephus's account.", "verdict": "SUPPORTED", "detail": "Graded 'strong' and identified as the single strongest Mark-side seam in the whole study — though it remains Mark's only strong seam, with the rest of Mark's Josephus overlap explained by register and shared topic.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §4 table, §5"}, {"claim": "Matthew and John, like Luke-Acts, depend on Josephus.", "test": "Same calibrated method (distinctive vocabulary, LXX/control exclusion, phrase-level test, seam search) applied to Matthew and John.", "verdict": "REFUTED", "detail": "A deliberate, useful negative result: Matthew and John show no dependence beyond what is fully explained by the shared 1st-century-Judea subject-world and shared koine register — dependence is specific to Luke-Acts, not a generic 'Gospels-and-Josephus' phenomenon.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §5"}, {"claim": "If Luke-Acts depends on Josephus's Antiquities (published 93/94 CE), this fixes a firm lower bound on the date of Luke-Acts.", "test": "Derived a dating implication from the directional-seam evidence (errors run only from Luke misreading Josephus, never the reverse).", "verdict": "CONFIRMED", "detail": "The directional logic is decisive — Josephus's Antiquities is internally coherent while Luke-Acts excerpts and garbles it — requiring Luke-Acts to postdate Antiquities, i.e. Luke-Acts ≥ ~95-100 CE.", "citation": "GOSPELS_JOSEPHUS_DEPENDENCY.md §5"}]}, {"slug": "gmirkin", "name": "Russell E. Gmirkin", "field": "Pentateuch origins — Plato, Berossus, Alexandria 270 BCE", "thesis": "Gmirkin argues the Pentateuch was composed by Jewish scholars in Alexandria c.270 BCE, drawing on Plato's Laws for its constitutional/legal framework, on Berossus's Babyloniaca for Genesis 1-11 (creation, flood, king-lists), and on Manetho's Aegyptiaca for the Exodus narrative (inverting the Hyksos-expulsion story). The thesis implies the entire Torah, not just its Greek dress, is a Hellenistic-era literary construction.", "our_verdict": "We extracted Gmirkin's full book (177k words) and independently re-ran his strongest claims: his signature move — 'feature X is in Bible+Plato/Athens, absent from the Ancient Near East' — failed on 13 test cases against the actual ANE law codes (0 HOLD / 6 MOSTLY / 6 OVERSTATED / 1 FALSE), with Hammurabi and MAL provisions he missed or waved away. A real, non-trivial Greek residue does survive, but it clusters at the level of FORM (persuasive legal prologues, the politeia/constitution genre, foundation-story framing) rather than statute content. Independently, our validated Hebrew-language clock (calibrated against externally-dated Dead Sea Scrolls and Ben Sira) reads the Torah as genuinely Classical Hebrew, ~1.9 sigma more archaic than Hellenistic-era Hebrew — even a deliberate 180 BCE classicizer (Ben Sira) couldn't suppress the late marker as far as the Torah sits. Net verdict: 'old Hebrew core, Greek dress/form' — a real formal/constitutional Greek layer is plausible, but 'Pentateuch composed wholesale from Plato in 270 BCE' is not supported by the language itself. [Re-verified 07/10/2026: the underlying test scripts were re-run against the post-consolidation corpus — every published number reproduced exactly; verdict unchanged.]", "items": [{"claim": "Deuteronomy is directly modeled on Plato's Laws; the Pentateuch's legal system as a whole derives from Athenian/Platonic law more than ANE law", "test": "Adversarial ANE-specialist audit of his 13 strongest 'absent-from-ANE' parallel claims against the actual Hammurabi, Eshnunna, Hittite, MAL, Ur-Nammu, Neo-Babylonian codes", "verdict": "OVERSTATED", "detail": "0 of 13 claims held up as genuinely ANE-absent; 6 were MOSTLY_HOLDS, 6 OVERSTATED, 1 FALSE. Smoking guns he missed or misexplained: Hammurabi paragraphs 206-208 (intent/premeditation distinction, refuting his claim premeditated-murder is a Platonic innovation), Eshnunna paragraphs 12-13 (night-burglar rule), MAL B paragraphs 8-9 (boundary law, where he rebutted the wrong ANE candidate).", "citation": "study-gmirkin-structural-audit.md; scholars/russell-gmirkin/book/intensive research/gmirkin-structural-test/DISTINCTIVENESS_AUDIT.md, ANE_AUDIT_REPRODUCED.md"}, {"claim": "Premeditated vs. unpremeditated murder is a legal innovation unique to Plato's Laws, absent from Athenian and ANE law, and borrowed into the Covenant Code", "test": "Text search of Hammurabi paragraphs 206-208 ('I did not injure him wittingly') for an intent/premeditation distinction", "verdict": "REFUTED", "detail": "Hammurabi 206-208 already distinguishes intentional from unintentional injury/homicide roughly a millennium before Plato, directly refuting the claim that this distinction first appears in Plato's Laws.", "citation": "study-gmirkin-structural-audit.md"}, {"claim": "Plato's Laws is the uniquely appropriate Greek model because it is 'the only comparable national literature in antiquity,' matching the Torah's genre range", "test": "Text-mined Laws for vocabulary density across 12 literary genres (poetry, hymns, education, history/myth, tragedy, wisdom, censorship, etc.) against a 474-text Greek corpus", "verdict": "SUPPORTED", "detail": "11 of 12 genre categories confirmed present at high density in Laws (censorship search returned a false zero from narrow search terms, not genuine absence); no other single Greek text covers this generic range, which is real support for Gmirkin's genre-comparison move, though the argument becomes close to unfalsifiable once his control shifts to 'no comparable text exists.'", "citation": "scholars/russell-gmirkin/book/intensive research/computational_tests/BATTERY_ANALYSIS.md (Test 6a)"}, {"claim": "Plato's Laws features a distinctive twelve-tribe civic structure paralleling Israel's twelve tribes", "test": "Corpus search for co-occurring 'twelve' (dodeka) and 'tribe' (phyle) in Laws vs. the Republic", "verdict": "SUPPORTED", "detail": "Four passages in Laws (6.756, 6.771, 8.828, 8.843) explicitly combine twelve and tribe vocabulary, versus only one bare mention of 'twelve' in the Republic and zero co-occurrences — a real and specific structural parallel, one of Gmirkin's stronger formal points.", "citation": "BATTERY_ANALYSIS.md (Test 2b)"}, {"claim": "Constitutional/legal vocabulary density shows Laws, not the Republic, is Plato's real 'constitutional' text and the natural Pentateuch analogue", "test": "Root-frequency count of law/citizen/council/judge/tribe vocabulary in Laws vs. Republic", "verdict": "SUPPORTED", "detail": "Laws has 46% more constitutional vocabulary per word than the Republic (18.2 vs 12.5 per 1000 words), with top terms (law, political/citizen, council, judge, tribe) mapping onto exactly the Pentateuch's vocabulary of law, citizenship, tribes, and judgment.", "citation": "BATTERY_ANALYSIS.md (Test 2a)"}, {"claim": "The Pentateuch's legal-prologue structure (motive clauses, hortatory prefaces attached to individual laws — the 'persuasive prelude' / double-law technique) is borrowed from Plato's Laws", "test": "Automated detection of prooimion (prelude) vocabulary in Laws vs. the corpus, and an attempted passage-level 'double law' structure detector", "verdict": "PARTIAL", "detail": "Prelude vocabulary is real and dense in Laws but not unique to it (57 texts show some prooimion vocabulary, including rhetoricians and historians); the automated double-law structure detector failed outright (0% detection, a methodology gap not a refutation). This 'persuasive-law-form' claim is Gmirkin's own strongest named evidence and is one of the few residues our structural audit found genuinely FORMAL rather than statutory, but it awaits a dedicated passage-level test.", "citation": "BATTERY_ANALYSIS.md (Tests 4a, 4b); study-gmirkin-structural-audit.md"}, {"claim": "Genesis 1-11 (creation, flood, antediluvian king-list/genealogies) was shaped by Berossus's Babyloniaca as preserved in Josephus's Contra Apionem", "test": "Lexical (Jaccard) overlap between the Berossus excerpts in Contra Apionem 1.128-154 and Genesis 1-11/5/6-9 in the LXX, compared against a same-book control (rest of CA1)", "verdict": "OVERSTATED", "detail": "Berossus-vs-Genesis overlap (Jaccard 0.041-0.043) is statistically indistinguishable from the control comparison of unrelated Contra Apionem material against Genesis (Jaccard 0.053) — no distinctive vocabulary signal isolates a Berossus-Genesis link above generic background overlap.", "citation": "scholars/russell-gmirkin/book/intensive research/computational_tests/berossus_manetho_full_output.txt (Test 1)"}, {"claim": "The Exodus narrative (plagues, expulsion, wilderness wandering) was shaped by / inverts Manetho's account of the Hyksos expulsion from Egypt", "test": "Lexical (Jaccard) overlap between Manetho fragments in Contra Apionem 1.73-105 and Exodus 1-15, compared against Manetho-vs-Genesis and same-book controls", "verdict": "OVERSTATED", "detail": "Manetho-vs-Exodus Jaccard (0.034-0.046) is essentially the same magnitude as Manetho-vs-Genesis (0.051) and the same-book control (0.053) — the raw vocabulary comparison does not isolate a distinctive Manetho-Exodus link; any real relationship (if present) is at the level of narrative motif/inversion, not shared diction, and remains unquantified by this test.", "citation": "berossus_manetho_full_output.txt (Test 2)"}, {"claim": "Stoning as a codified legal penalty (not mob violence) is unique to Plato's Laws and the Pentateuch among ancient law", "test": "Corpus search for stoning-root vocabulary (lambda-iota-theta-) across 782 Greek texts including Laws", "verdict": "PARTIAL", "detail": "Laws itself returned zero hits (likely an encoding/vocabulary mismatch, since Plato discusses the penalty procedurally), while 40 other texts show stoning vocabulary, almost entirely narrating mob stoning rather than codified legal punishment — the search could not distinguish the two senses, so the claim is untested rather than confirmed or refuted.", "citation": "BATTERY_ANALYSIS.md (Test 3b)"}, {"claim": "The Hebrew Bible functions as psychagogic ('soul-leading') literature, a distinctively Hellenistic/Platonic concept, evidencing Greek intellectual influence reaching into Jewish thought", "test": "Corpus search for psychagogia vocabulary across 52 Greek texts including Plato's Laws, Phaedrus, Timaeus, and Josephus's Jewish Antiquities", "verdict": "SUPPORTED", "detail": "Psychagogia vocabulary is a genuine Platonic technical concept (locus classicus in Phaedrus) and does appear 4 times in Josephus's Antiquities, showing Josephus was aware of and used the Hellenistic concept — real evidence of Greek intellectual vocabulary penetrating later Hellenistic Jewish writing (Josephus), though this speaks to 1st-century reception, not necessarily to the Pentateuch's own composition date.", "citation": "BATTERY_ANALYSIS.md (Test 6c)"}, {"claim": "The Pentateuch was composed c.270 BCE in Alexandria, making its Hebrew a late Hellenistic-era product", "test": "Validated CBH/LBH Hebrew stylometric clock, calibrated on externally-dated Dead Sea Scrolls sectarian compositions (~2nd c. BCE-1st c. CE, Gmirkin's own claimed era) and Ben Sira (dated ~180 BCE)", "verdict": "REFUTED", "detail": "The Torah reads Classical Hebrew (mean z -0.469), 1.93 book-sigma more archaic than DSS sectarian compositions from Gmirkin's proposed era of composition (+0.609) — even within the same scribal community and encoding. Ben Sira, an externally-dated ~180 BCE deliberately classicizing text, still trips the late-Hebrew marker (relative-she 0.159 vs Torah's flat 0.000), showing the clock resists archaizing and that a genuine late composition could not fake the Torah's profile.", "citation": "study-hebrew-clock-torah.md (Probes HEB2, HEB3)"}, {"claim": "(Implicit corollary) If any Pentateuchal source were the latest, most 'Hellenized' layer, it should be detectable as linguistically late", "test": "Ran the same validated Hebrew clock at the J/E/P/D/H source level using three independent verse-to-source maps (Friedman, Yoreh, Carpenter-Harford)", "verdict": "REFUTED", "detail": "All five sources, including the latest-reading P, fall far below the late-Hebrew threshold and nowhere near the Hellenistic-era DSS anchor; P's apparent lateness collapses onto a single pronoun-usage axis matching exactly the profile of the 6th-century-BCE prophet Ezekiel, not a 3rd-century Hellenistic milieu.", "citation": "study-documentary-clock.md (Probe HEB4)"}, {"claim": "Greek philosophical/mythological vocabulary detected in the Hebrew Bible's key religious terms (priest, altar, law, judgment, death, etc.) is evidence the underlying Hebrew composition drew on Greek concepts", "test": "Verse-aligned comparison of 14 signature Platonic Greek concepts in the LXX against their underlying Hebrew (MorphHB/Strong's) equivalents across 5,729 aligned verses", "verdict": "REFUTED", "detail": "All 14 Platonic-sounding Greek terms map onto ordinary, high-frequency native Hebrew words (e.g., priest/hiereus to kohen, law/nomos to torah), with Greek priestly-vocabulary density mirroring the Hebrew content rank-for-rank — the apparent Platonism lives entirely in the Greek translation layer, not the Hebrew text Gmirkin claims was originally composed in a Hellenistic milieu.", "citation": "study-hebrew-clock-torah.md (Probe A2, translator-upgrade test)"}, {"claim": "Greek myth (Argonauts/Wajdenbaum program) supplies distinctive narrative material embedded in the Hebrew Bible, consistent with a Hellenistic compositional milieu", "test": "Calibrated 2-axis (contact-tier x distinctiveness) survey of Hebrew Bible-Greek myth parallels, checking for verbal borrowing at the Hebrew (not LXX-translation) level", "verdict": "OVERSTATED", "detail": "No clean distinctive verbal borrowing from Greek was found in the Hebrew text itself; the only genuine Greek-side verbal data points (Nephilim to gigantes, plasso) are artifacts of the LXX Greek translation choices, not the underlying Hebrew composition — reinforcing that the Greek signal sits in translation/dress, not the Hebrew core.", "citation": "study-greek-myth-parallels.md"}]}, {"slug": "adler", "name": "Yonatan Adler", "field": "Archaeology of Torah observance", "thesis": "In The Origins of Judaism (Yale, 2022), Adler argues that archaeological evidence for widespread, everyday Torah observance (Sabbath, dietary law, ritual purity via mikvaot, aniconic art, tefillin) only appears starting in the Hasmonean period (mid-to-late 2nd century BCE), centuries after the Torah's traditional composition date — implying either late composition or, more precisely, a long gap between text and mass practice.", "our_verdict": "Our own 16-agent, 188-finding investigation (asking the Maccabean-era question directly) confirms Adler's practice-side claim with one correction: enforcement and mass observance begin with the Hasmoneans, but the Torah TEXT itself is demonstrably older (attested at Qumran ~250 BCE, cited in Ben Sira ~180 BCE, and reading as genuinely archaic Classical Hebrew on our independent language clock). The word Ioudaismos itself is first attested exactly in this Maccabean crisis. The correct synthesis is 'old text, late practice' — Adler is right that mass observance is a Hasmonean-era phenomenon, but this should not be over-read as evidence the Torah was composed that late.", "items": [{"claim": "Ritual immersion pools (mikvaot) required for observing purity law appear in the archaeological record only from the Hasmonean period onward", "test": "Cross-referenced Adler's mikvah dating against our Maccabean-era timeline and literary corroboration (Maccabees, Josephus)", "verdict": "CONFIRMED", "detail": "Essentially zero of roughly 1,000 known mikvaot pre-date the Hasmonean period; the archaeological silence before ~2nd century BCE is stark and matches Adler's claim of a sharp practice threshold at that time.", "citation": "study-maccabean-judaism.md (C4)"}, {"claim": "Tefillin (phylacteries) as a practiced observance are attested no earlier than the mid-2nd century BCE", "test": "Checked earliest tefillin-related archaeological/textual attestation against the Hasmonean-era window", "verdict": "CONFIRMED", "detail": "Tefillin practice is attested at the earliest mid-2nd century BCE, consistent with Adler's broader claim that Torah-law observance materializes as a mass phenomenon only in this window, not earlier.", "citation": "study-maccabean-judaism.md (C4)"}, {"claim": "A shift toward aniconic (figure-free) art and coinage marks the archaeological signature of Torah-observant identity taking hold", "test": "Checked coin iconography timeline against the Hasmonean political calendar", "verdict": "CONFIRMED", "detail": "Aniconic Hasmonean coinage appears from roughly 131 BCE onward, tracking the same post-Maccabean-crisis window as mikvaot and tefillin — three independent material-culture lines converge on the same threshold.", "citation": "study-maccabean-judaism.md (C4)"}, {"claim": "Widespread/mass Torah observance (as opposed to elite or textual awareness) only begins with the Hasmoneans, not with Moses, Ezra, or the Persian period", "test": "188-finding, 16-agent evidentiary audit (harvest + adversarial verification) synthesizing text, archaeology, and epigraphy across 500-63 BCE, including Elephantine papyri and Ben Sira as controls", "verdict": "CONFIRMED", "detail": "Elephantine Judean colonists (5th century BCE) show no evidence of Mosaic Torah practice (multi-deity temple fund, no mention of Moses/Torah in their own letters); Ben Sira (~180 BCE) treats Torah as elite Wisdom but shows zero references to sabbath, kashrut, or festivals — both are direct textual confirmations of Adler's 'no mass practice yet' claim right up to the eve of the Maccabean crisis.", "citation": "study-maccabean-judaism.md (C1-C4 four-way split)"}, {"claim": "The very concept/word for a coherent, enforceable 'Judaism' is a product of this same crisis period, not an ancient given", "test": "Grep-verified every occurrence of the Greek word Ioudaismos in the corpus (2 Maccabees, LXX)", "verdict": "CONFIRMED", "detail": "Ioudaismos is first attested exactly in this Maccabean-crisis literature (2 Macc 2:21, 8:1, 14:38x2), including a passage where a man named Razis is 'accused of Judaism' as a chargeable allegiance — the word for the thing Adler says starts being enforced is coined in the very episode of its first enforcement.", "citation": "study-maccabean-judaism.md"}, {"claim": "Antiochus IV's persecution and the Maccabean revolt were the proximate trigger that converted elite/textual Torah authority into an enforced, mass communal identity", "test": "Built and cross-checked a 5-stage 'enforcement cascade' model (Antiochus's anti-Torah coercion -> Mattathias's counter-coercion -> Hanukkah legislated as statute -> forced state conversions of Idumea/Iturea -> halakha as domestic state policy) against 1-2 Maccabees, Josephus, and Daniel", "verdict": "CONFIRMED", "detail": "The stages are independently attested and sequential (1 Macc 1:56-57 death penalty for scroll possession under Antiochus; 1 Macc 2:46 forcible circumcision under Mattathias; 1 Macc 2:41 legislated Hanukkah decree; Josephus Ant. 13.257-258 Idumean forced/ultimatum conversion, coin-dated Gerizim destruction ~112-110 BCE), giving a mechanistic account of how enforcement emerged rather than asserting the shift by fiat.", "citation": "study-maccabean-judaism.md (enforcement cascade, stages 0-5)"}, {"claim": "Daniel's account of the persecution (167-164 BCE) centers on temple-cult and calendar violations, distinct from the specific sabbath/circumcision/kashrut items 1 Maccabees itemizes", "test": "Grep-verified across MT, Old Greek, and Theodotion texts of Daniel for sabbath/circumcision/kashrut vocabulary", "verdict": "SUPPORTED", "detail": "Daniel 7:25 defines the persecution as an attempt to 'change times and law' with zero mentions of sabbath, circumcision, or kashrut in any textual version, while 1 Maccabees itemizes exactly those practices — supporting a 'decree-recast' hypothesis where later tradition sharpened a generic persecution account into specific halakhic terms, a nuance beyond Adler's own archaeological argument.", "citation": "study-maccabean-judaism.md"}, {"claim": "Because Torah observance archaeologically starts late, the Torah text itself should be read as a late (Hellenistic-era) composition", "test": "Cross-referenced Adler's practice-dating against our independently validated Hebrew-language clock (Torah reads Classical Hebrew, ~1.9 sigma more archaic than externally-dated Hasmonean-era Dead Sea Scroll Hebrew) and against pre-Maccabean textual attestation (4QExod-Lev-f ~250 BCE; Ben Sira 24:23 ~180 BCE citing Torah as authoritative; LXX translation project)", "verdict": "OVERSTATED", "detail": "This is the one place we correct rather than confirm Adler: the text-composition question and the mass-practice question are separable, and the evidence supports 'old text, late practice' rather than 'late practice therefore late text' — the Torah is independently attested and linguistically archaic well before the Hasmonean enforcement era Adler documents.", "citation": "study-maccabean-judaism.md (triangulation with study-hebrew-clock-torah.md); THINKING_LIKE_ADLER.md"}, {"claim": "Pig-bone frequency in the archaeological record can serve as a proxy for dating the adoption of Jewish dietary law", "test": "Checked pig-bone percentage trends against proposed Torah-adoption dates", "verdict": "REFUTED", "detail": "Pig bones are already below 2% in Iron Age strata, long before any plausible Torah-adoption or Hasmonean-enforcement date — the low percentage is confounded with regional/economic factors and cannot be used to date dietary-law adoption one way or the other; flagged as a dead-end proxy.", "citation": "study-maccabean-judaism.md (pork confound)"}, {"claim": "Pre-Hasmonean elite/textual awareness of Torah existed (e.g., 3rd-century Ptolemaic administration, Ben Sira) even though mass practice was absent", "test": "Checked Ben Sira (~180 BCE) and 3rd-century evidence for elite Torah authority versus population-wide observance markers", "verdict": "SUPPORTED", "detail": "Ben Sira treats Torah as authoritative elite Wisdom (24:23) a generation-plus before the Maccabean crisis, showing textual/elite authority pre-dates mass practice by decades — consistent with Adler's own model of authority preceding widespread observance, though the Hasmonean-driver mechanism for why elite authority converted to mass practice remains speculative/open in both his work and ours.", "citation": "study-maccabean-judaism.md (C2, C4 hedge)"}]}, {"slug": "youtube", "name": "YouTube claims — tested", "field": "Claims from scholar channels, computationally validated", "thesis": "Sixteen scholar/channel folders (SCHOLAR_INDEX.md) were harvested from YouTube transcripts into THINKING_LIKE_*.md methodology files; most catalogue claims as 'pending' with no test run. Only two of the non-flagship scholars (Joseph Atwill; Derreck Bennett/Daniel Glover) plus one cross-cutting Q/Marcion question (Mark Bilby's frontier) actually got put through the corpus pipeline with real Greek-text results.", "our_verdict": "The pattern is stark: grand unified-conspiracy claims (Atwill's Flavian-propaganda sequential typology) collapse completely under Greek forensics, while a modest, textually-anchored thesis (Glover's bilingual Jewish/Greco-Roman code-switching in Luke-Acts) survives almost intact — 10 of 12 sub-claims confirmed. The Q/Marcion-priority question tested in Bilby's frontier area landed at 'supports Q, not the bombshell no-Q result' — another case of the exciting claim underperforming the boring consensus. [Re-verified 07/10/2026: the underlying test scripts were re-run against the post-consolidation corpus — every published number reproduced exactly; verdict unchanged.]", "items": [{"claim": "Joseph Atwill: Gospel events parallel Titus's Jewish War campaign in the same sequential order (the 40+ parallel pairs)", "test": "Assigned chapter/verse positions to all four claimed parallel sets in the Gospels and Josephus's Jewish War; computed Spearman rank correlation between the two sequences, checked against permutation null", "verdict": "REFUTED", "detail": "rho < 0.07 and p > 0.5 for all four Gospels (Matthew rho=0.043 p=0.70; Mark rho=0.069 p=0.63; Luke rho=0.065 p=0.56; John rho=0.029 p=0.76). No statistically significant sequential alignment found.", "citation": "scholars/joseph-atwill/THINKING_LIKE_JOSEPH_ATWILL.md; atwill_definitive_test_results.md"}, {"claim": "Joseph Atwill: The Gospels share special/distinctive vocabulary with Josephus's Jewish War specifically (the 'Flavian signature')", "test": "Jaccard similarity and shared 3-gram counts between NT vocabulary and Jewish War vs. Antiquities vs. Plutarch vs. Plato, controlling for common Koine", "verdict": "REFUTED", "detail": "NT is closer to Antiquities (Jaccard 0.0259) than to Jewish War (0.0236), and shares MORE 3-grams with Plutarch (64) and Plato (34) than with Jewish War (20) — the opposite of Atwill's prediction.", "citation": "scholars/joseph-atwill/THINKING_LIKE_JOSEPH_ATWILL.md, Part VI"}, {"claim": "Joseph Atwill: Gospel-Jewish War vocabulary overlap exceeds what chance text pairing would produce", "test": "Permutation test comparing real Gospel/Jewish-War overlap against randomized text-pair baselines", "verdict": "REFUTED", "detail": "Real overlap came in LOWER than the random baseline (0.21-0.24x), directly contradicting the 'deliberate encoded parallel' thesis.", "citation": "scholars/joseph-atwill/THINKING_LIKE_JOSEPH_ATWILL.md, Part VI"}, {"claim": "Joseph Atwill: If any Josephus-Gospel dependency exists, it runs through Jewish War (his flagship claim) rather than Antiquities", "test": "Cross-check of which Josephus work the shared vocabulary/parallels actually cluster in, once JW was ruled out as special", "verdict": "OVERSTATED", "detail": "The definitive test shows that IF there is a Josephus-Gospel relationship, it runs through Antiquities/Vita — which is Adamczewski's thesis, not Atwill's. Atwill's mechanism (dark-comedy propaganda keyed to Jewish War) is not supported even where a Josephus link exists.", "citation": "scholars/joseph-atwill/THINKING_LIKE_JOSEPH_ATWILL.md, Part VI-VII"}, {"claim": "Derreck Bennett (Glover): Luke 1-2 is a deliberate Septuagintal pastiche, code-switching into archaic LXX Greek for the birth narrative before shifting to polished Hellenistic Greek", "test": "Measured density of core LXX marker vocabulary (σωτήρ, Ἰσραήλ, ὕψιστος, πνεῦμα ἅγιον, ἄγγελος, κύριος) per 10K words in Luke 1-2 vs. Luke 3-24", "verdict": "CONFIRMED", "detail": "Luke 1-2 shows 3.8x the LXX vocabulary density of the rest of Luke (498/10K vs 131/10K); individual markers spike as high as 25.5x (σωτήρ) and 11.9x (Ἰσραήλ). Treated as the standout result of the Glover test suite.", "citation": "scholars/_research/glover_findings.md (G7)"}, {"claim": "Derreck Bennett (Glover): Luke is the 'epiphany Gospel' among the Synoptics, with editorially-inserted glory/δόξα language absent from his Markan source", "test": "Compared epiphany-vocabulary and δόξα density per 10K words across all four Gospels, and specifically in the Transfiguration pericope across Synoptics", "verdict": "CONFIRMED", "detail": "Luke leads the Synoptics on δόξα density (12.1/10K vs Matt 5.7, Mark 3.3); in the Transfiguration scene specifically Luke uses δόξα twice where Mark and Matthew use it zero times — an editorial addition to his source.", "citation": "scholars/_research/glover_findings.md (G1, G8)"}, {"claim": "Derreck Bennett (Glover): Luke-Acts uses ἀναλαμβάνω (bodily assumption into heaven) as a technical marker of Greco-Roman hero-apotheosis, monopolizing it in the NT", "test": "Measured ἀναλαμβάνω frequency per 10K words across Luke-Acts, Mark, Matthew, John", "verdict": "SUPPORTED", "detail": "Luke-Acts uses the verb at 2.0/10K vs Mark 0.8/10K and zero in Matthew/John — genuine NT monopoly. Caveat from the separate pagan-influence audit: the verb's specific technical sense in Luke traces to the LXX Elijah/Enoch translation-narratives, not Plutarch's apotheosis vocabulary (ἁρπάζω) — so the term is real and distinctive, but its immediate source is Jewish-scriptural rather than directly pagan, refining rather than undercutting Glover's bilingual-encoding point.", "citation": "scholars/_research/glover_findings.md (G9); cross-checked against study-pagan-influence.md ascension findings"}, {"claim": "Derreck Bennett (Glover): Acts 26:14 (Paul's Damascus-road vision) echoes Euripides' Bacchae 795 word-for-word (σκληρός + κέντρα + λακτίζω)", "test": "Searched the full NT for the co-occurring formula and checked against the Bacchae passage", "verdict": "CONFIRMED", "detail": "The three-term formula appears in exactly one verse of the entire NT (Acts 26:14), matching the identical Euripidean phrase πρὸς κέντρα λακτίζειν — a verified, rare, load-bearing literary echo placed in a Christophany scene.", "citation": "scholars/_research/glover_findings.md (G5)"}, {"claim": "Derreck Bennett (Glover): Acts stages more divine-epiphany/deification scenes (Cornelius, Herod, Lystra, Malta) than any other NT book, framing Jesus/apostles within the Mediterranean divine-man tradition", "test": "Verified the five claimed deification scenes against the Acts text", "verdict": "CONFIRMED", "detail": "All five scenes confirmed in the text (Cornelius before Peter 10:25; Herod hailed as a god 12:22; Zeus/Hermes at Lystra 14:11; Paul mistaken for a god at Malta 28:6) — Acts leads the NT on this count.", "citation": "scholars/_research/glover_findings.md (G11)"}, {"claim": "Derreck Bennett (Glover): Luke is the most literarily sophisticated Gospel author (periodic sentences, Atticist style)", "test": "Type-token ratio and average-word-length comparison across all 27 NT books", "verdict": "PARTIAL", "detail": "TTR ranks Luke #24/27 (an artifact of TTR penalizing long texts), but average word length (a length-independent proxy) ranks Luke #14. Verdict: not capturable by lemmatized word-level statistics — neither confirmed nor refuted with current tools.", "citation": "scholars/_research/glover_findings.md (G2)"}, {"claim": "Derreck Bennett (Glover): John's Gospel carries distinctively Dionysian motifs (eating flesh, wine/feast imagery) at higher density than the Synoptics", "test": "Aggregate Dionysian-vocabulary density across John vs. other Gospels, plus specific diagnostic terms (τρώγω, σάρξ, ἑορτή)", "verdict": "PARTIAL", "detail": "Aggregate density is only marginally higher in John (59.5 vs 54.9/10K, +8.4%), but the specific diagnostic terms are overwhelmingly Johannine (τρώγω is John-only; σάρξ 8.0 vs Luke's 1.0; ἑορτή 10.4 vs 1.5) — the claim holds at the level of specific motifs, not in aggregate.", "citation": "scholars/_research/glover_findings.md (G6)"}, {"claim": "Mark Bilby (Q reconstruction/Marcion priority frontier): the Synoptic double-tradition material can be explained by direct Matthew-Luke literary contact, eliminating the need for a Q source", "test": "Self-calibrating directional test: validated the fatigue/primitivity/verbatim-agreement method on 10 triple-tradition controls (must recover Markan priority), then applied it to 48 double-tradition pericopes", "verdict": "REFUTED", "detail": "Method validated 10/10 on Markan-priority controls, but the double-tradition direction genuinely ALTERNATES between Matthew-prior and Luke-prior passages with no cross-bleed of the other's redactional idiolect (e.g., Luke 11:20's 'finger of God' preserves a non-Spirit reading against his own signature theme, ruling out his copying Matthew's Spirit-wording) — this pattern requires a shared prior source (Q), against the no-Q hope.", "citation": "study-synoptic-q.md; scholars/mark-bilby/analysis/ (data-science pipeline underlying the test)"}]}];
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const VC={CONFIRMED:"var(--v-conf)",SUPPORTED:"var(--v-supp)",PARTIAL:"var(--v-part)",OVERSTATED:"var(--v-over)",REFUTED:"var(--v-ref)"};

SCH.forEach((s,i)=>{const b=document.createElement('button');b.textContent=s.name.split(' ').slice(-1)[0]==='tested'?'YouTube claims':s.name.replace(/^(Dennis R\.|Russell E\.|Steve|Yonatan)\s/,'');
 if(i===0)b.classList.add('on');b.onclick=()=>{SI=i;[...stab.children].forEach(x=>x.classList.toggle('on',x===b));render()};stab.appendChild(b)});
const FILTERS=["ALL","CONFIRMED","SUPPORTED","PARTIAL","OVERSTATED","REFUTED"];

FILTERS.forEach(k=>{const b=document.createElement('button');b.textContent=k==="ALL"?"All":k.toLowerCase();if(k==="ALL")b.classList.add('on');
 b.onclick=()=>{F=k;[...fb.children].forEach(x=>x.classList.toggle('on',x===b));render()};fb.appendChild(b)});
function render(){const s=SCH[SI];
 let items=(s.items||[]);if(F!=="ALL")items=items.filter(i=>i.verdict===F);

 const tally=Object.entries(counts).map(([k,n])=>`${n} ${k.toLowerCase()}`).join(' · ');
 let h=`<div class="hero"><div class="fld">${esc(s.field)}</div><h1>${esc(s.name)}</h1>`

 items.forEach(i=>{const col=VC[i.verdict]||"var(--dim)";
  h+=`<div class="item"><div class="top"><div class="cl">${esc(i.claim)}</div><span class="vbadge" style="background:${col}">${esc(i.verdict)}</span></div>`

 if(!items.length)h+='<p style="color:#8f8b84;padding:20px">No items under this filter.</p>';
 document.getElementById('wrap').innerHTML=h;}
